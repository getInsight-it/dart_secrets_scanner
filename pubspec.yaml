name: dart_secrets_scanner
description: command-line tool designed to scan Dart and related files in Flutter projects for hardcoded sensitive information such as API keys, tokens, passwords, and other credentials.
version: 2.0.1
homepage: https://github.com/Wreos/dart_secrets_scanner
issue_tracker: https://github.com/Wreos/dart_secrets_scanner/issues
topics:
  - security
  - devsecops
  - protection
  - scanner

environment:
  sdk: '>=3.8.0 <4.0.0'

executables:
  dart_secrets_scanner:

dependencies:
  path: ^1.9.1
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.1.0
  test: ^1.29.0
