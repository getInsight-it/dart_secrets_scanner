name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test

  publish:
    needs: validate
    if: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.PUB_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart pub token add https://pub.dev --env-var PUB_TOKEN
        env:
          PUB_TOKEN: ${{ secrets.PUB_TOKEN }}
      - run: dart pub publish --dry-run
      - run: dart pub publish --force
